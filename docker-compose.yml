services:
  chatbizos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbizos
    env_file:
      - .env
    ports:
      - "18789:18789"
    volumes:
      - ./agents:/opt/chatbizos/agents
      - ./config:/opt/chatbizos/config
      - ./workspace-template:/opt/chatbizos/workspace-template
      - ./.env:/opt/chatbizos/.env:ro
      - ./.openclaw:/opt/chatbizos/.openclaw
      - ./workspace:/opt/chatbizos/workspace
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
