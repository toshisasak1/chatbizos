# ChatBizOS Configuration
project:
  name: "My Business"
  description: ""
  timezone: "UTC"

llm:
  default: "openai"
  providers:
    openai:
      auth: api_key
      model: gpt-4o
    anthropic:
      auth: api_key
      model: claude-sonnet-4-5-20250929
    local:
      endpoint: "http://localhost:11434"
      model: llama3

agents:
  producer:
    default: true
    model: "openai"
  concept:
    model: "openai"
  conversation:
    model: "openai"
  builder:
    model: "openai"
  compliance:
    model: "openai"

channels:
  active: "discord"
  discord:
    enabled: true
    env:
      bot_token: DISCORD_BOT_TOKEN
      guild_id: DISCORD_GUILD_ID
      channel_id: DISCORD_CHANNEL_ID
  slack:
    enabled: false
    env:
      bot_token: SLACK_BOT_TOKEN
      app_token: SLACK_APP_TOKEN
      channel_id: SLACK_CHANNEL_ID

cron:
  morning_briefing:
    schedule: "0 9 * * *"
    timezone: "UTC"
    agent: producer
    message: "Generate morning briefing. Read STATUS.md and task_queue.md, summarize progress, identify blockers, and recommend today's priorities."
  nightly_review:
    schedule: "0 3 * * *"
    timezone: "UTC"
    agent: producer
    message: "Run nightly meta review. Check all agent session histories, identify improvements, update LEARNINGS.md."
  weekly_progress_report:
    schedule: "0 10 * * 1"
    timezone: "UTC"
    agent: producer
    message: "Generate the weekly progress report. Summarize completed milestones, open blockers, risks, and next week's priorities."
